# --------------------------------------------------
# Production Docker Compose for RepoSwarm
# --------------------------------------------------
# This file is deployed to VMs via Terraform user-data.
# For local development, use: reposwarm new --local

services:
  # --------------------------------------------------
  # Temporal Postgres
  # --------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------
  # Temporal Server
  # --------------------------------------------------
  temporal:
    image: temporalio/auto-setup:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:7233:7233"
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # --------------------------------------------------
  # Temporal UI
  # --------------------------------------------------
  temporal-ui:
    image: temporalio/ui:latest
    restart: unless-stopped
    depends_on:
      - temporal
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # --------------------------------------------------
  # RepoSwarm API
  # --------------------------------------------------
  api:
    image: ghcr.io/reposwarm/api:latest
    restart: unless-stopped
    depends_on:
      - temporal
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      API_BEARER_TOKEN: ${API_BEARER_TOKEN}
      TEMPORAL_SERVER_URL: temporal:7233
      TEMPORAL_HTTP_URL: http://temporal-ui:8080
      TEMPORAL_NAMESPACE: default
      AWS_REGION: ${AWS_REGION}
      DYNAMODB_TABLE: ${DYNAMODB_TABLE}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --------------------------------------------------
  # RepoSwarm Worker
  # --------------------------------------------------
  worker:
    image: ghcr.io/reposwarm/worker:latest
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_SERVER_URL: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: investigate-task-queue
      AWS_REGION: ${AWS_REGION}
      DYNAMODB_TABLE: ${DYNAMODB_TABLE}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # --------------------------------------------------
  # RepoSwarm UI
  # --------------------------------------------------
  ui:
    image: ghcr.io/reposwarm/ui:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      TEMPORAL_SERVER_URL: http://temporal-ui:8080
      AWS_REGION: ${AWS_REGION}
      DYNAMODB_CACHE_TABLE: ${DYNAMODB_TABLE}
      API_BEARER_TOKEN: ${API_BEARER_TOKEN}
      REPOSWARM_API_URL: http://api:3000
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  # --------------------------------------------------
  # Nginx Reverse Proxy
  # --------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - ui
      - api
      - temporal-ui
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/nginx/certs
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

volumes:
  postgres-data:
    driver: local
  nginx-certs:
    driver: local
