apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reposwarm.fullname" . }}-ui
  labels:
    {{- include "reposwarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ui
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: ui
    spec:
      {{- if .Values.ui.serviceAccount.create }}
      serviceAccountName: {{ include "reposwarm.fullname" . }}-ui
      {{- end }}
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          ports:
            - containerPort: {{ .Values.ui.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "reposwarm.fullname" . }}-config
          env:
            - name: API_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "reposwarm.fullname" . }}-secrets
                  key: API_BEARER_TOKEN
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
---
{{- if .Values.ui.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "reposwarm.fullname" . }}-ui
  labels:
    {{- include "reposwarm.labels" . | nindent 4 }}
  {{- with .Values.ui.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
