apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reposwarm.fullname" . }}-temporal-ui
  labels:
    {{- include "reposwarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-ui
spec:
  replicas: {{ .Values.temporalUi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-ui
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: temporal-ui
    spec:
      containers:
        - name: temporal-ui
          image: "{{ .Values.temporalUi.image.repository }}:{{ .Values.temporalUi.image.tag }}"
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: TEMPORAL_ADDRESS
              value: "{{ include "reposwarm.fullname" . }}-temporal:7233"
          resources:
            {{- toYaml .Values.temporalUi.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
