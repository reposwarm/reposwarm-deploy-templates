apiVersion: v1
kind: Service
metadata:
  name: {{ include "reposwarm.fullname" . }}-temporal-ui
  labels:
    {{- include "reposwarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-ui
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: temporal-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
