apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reposwarm.fullname" . }}-worker
  labels:
    {{- include "reposwarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: worker
    spec:
      {{- if .Values.worker.serviceAccount.create }}
      serviceAccountName: {{ include "reposwarm.fullname" . }}-worker
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          envFrom:
            - configMapRef:
                name: {{ include "reposwarm.fullname" . }}-config
          env:
            {{- if .Values.secrets.githubToken }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "reposwarm.fullname" . }}-secrets
                  key: GITHUB_TOKEN
            {{- end }}
            {{- if .Values.secrets.gitlabToken }}
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "reposwarm.fullname" . }}-secrets
                  key: GITLAB_TOKEN
            {{- end }}
            {{- if .Values.secrets.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "reposwarm.fullname" . }}-secrets
                  key: ANTHROPIC_API_KEY
            {{- end }}
            {{- if eq .Values.worker.useBedrock "true" }}
            - name: CLAUDE_CODE_USE_BEDROCK
              value: "1"
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
---
{{- if .Values.worker.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "reposwarm.fullname" . }}-worker
  labels:
    {{- include "reposwarm.labels" . | nindent 4 }}
  {{- with .Values.worker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
