apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reposwarm.fullname" . }}-temporal
  labels:
    {{- include "reposwarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
spec:
  replicas: {{ .Values.temporal.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: temporal
    spec:
      containers:
        - name: temporal
          image: "{{ .Values.temporal.image.repository }}:{{ .Values.temporal.image.tag }}"
          ports:
            - containerPort: 7233
              name: grpc
          env:
            - name: DB
              value: "postgres12"
            - name: DB_PORT
              value: {{ .Values.temporal.postgres.port | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.temporal.postgres.user | quote }}
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "reposwarm.fullname" . }}-secrets
                  key: TEMPORAL_POSTGRES_PASSWORD
            - name: POSTGRES_SEEDS
              value: {{ include "reposwarm.temporalPostgresHost" . | quote }}
          resources:
            {{- toYaml .Values.temporal.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 30
            periodSeconds: 10
