apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reposwarm.fullname" . }}-config
  labels:
    {{- include "reposwarm.labels" . | nindent 4 }}
data:
  AWS_REGION: {{ .Values.aws.region | quote }}
  DYNAMODB_TABLE: {{ .Values.aws.dynamodbTable | quote }}
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "investigate-task-queue"
  TEMPORAL_SERVER_URL: "{{ include "reposwarm.fullname" . }}-temporal:7233"
  TEMPORAL_HTTP_URL: "http://{{ include "reposwarm.fullname" . }}-temporal-ui:8080"
  REPOSWARM_API_URL: "http://{{ include "reposwarm.fullname" . }}-api:3000"
