apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reposwarm.fullname" . }}-secrets
  labels:
    {{- include "reposwarm.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_BEARER_TOKEN: {{ .Values.secrets.apiBearerToken | quote }}
  {{- if .Values.secrets.githubToken }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
  {{- end }}
  {{- if .Values.secrets.gitlabToken }}
  GITLAB_TOKEN: {{ .Values.secrets.gitlabToken | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if and .Values.postgres.enabled .Values.postgres.credentials.password }}
  POSTGRES_PASSWORD: {{ .Values.postgres.credentials.password | quote }}
  {{- end }}
  {{- if .Values.temporal.postgres.password }}
  TEMPORAL_POSTGRES_PASSWORD: {{ .Values.temporal.postgres.password | quote }}
  {{- end }}
